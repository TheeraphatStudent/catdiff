version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: catdiff_postgres
    environment:
      POSTGRES_DB: catdiff_delivery
      POSTGRES_USER: catdiff_user
      POSTGRES_PASSWORD: catdiff_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - catdiff_network

  nestjs-app:
    build: .
    container_name: catdiff_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: catdiff_user
      DATABASE_PASSWORD: catdiff_password
      DATABASE_NAME: catdiff_delivery
      JWT_SECRET: your_jwt_secret_here
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - catdiff_network
    volumes:
      - .:/app
      - /app/node_modules

  redis:
    image: redis:7-alpine
    container_name: catdiff_redis
    ports:
      - "6379:6379"
    networks:
      - catdiff_network

volumes:
  postgres_data:

networks:
  catdiff_network:
    driver: bridge
